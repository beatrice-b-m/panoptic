<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- maskable: filled background, content within safe zone (center 80%) -->
  <rect width="512" height="512" fill="#141418"/>
  <rect x="82" y="102" width="348" height="308" rx="20" fill="#1c1c24" stroke="#2e2e3a" stroke-width="3"/>
  <!-- title bar dots -->
  <circle cx="118" cy="132" r="8" fill="#e53935"/>
  <circle cx="144" cy="132" r="8" fill="#fbc02d"/>
  <circle cx="170" cy="132" r="8" fill="#43a047"/>
  <!-- divider -->
  <line x1="82" y1="154" x2="430" y2="154" stroke="#2e2e3a" stroke-width="2"/>
  <!-- prompt -->
  <text x="108" y="196" font-family="monospace" font-size="24" fill="#4fc3f7">$</text>
  <rect x="132" y="178" width="150" height="22" rx="4" fill="#4fc3f722"/>
  <text x="108" y="236" font-family="monospace" font-size="24" fill="#4fc3f7">$</text>
  <rect x="132" y="218" width="100" height="22" rx="4" fill="#4fc3f722"/>
  <!-- grid pane split -->
  <line x1="256" y1="260" x2="256" y2="388" stroke="#4fc3f7" stroke-width="2" opacity="0.5"/>
  <line x1="108" y1="324" x2="404" y2="324" stroke="#4fc3f7" stroke-width="2" opacity="0.5"/>
  <!-- cursor -->
  <rect x="132" y="260" width="12" height="20" rx="2" fill="#4fc3f7" opacity="0.8"/>
</svg>
